<!doctype html>
<html>
  <head>
    <title>Group Chat</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
      body {
        background: #0f2027;
        color: white;
      }

      .chat-box {
        height: 400px;
        overflow: auto;
        padding: 10px;
        background: #111;
        border-radius: 10px;
      }

      .msg {
        padding: 8px;
        margin: 5px;
        border-radius: 10px;
        background: #1e3c72;
        max-width: 70%;
      }

      .me {
        background: #0d6efd;
        margin-left: auto;
      }

      .input-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #222;
        padding: 10px;
        display: flex;
        gap: 5px;
      }

      input {
        flex: 1;
      }

      .menu {
        cursor: pointer;
        float: right;
      }

      .preview img,
      video {
        width: 100%;
        border-radius: 10px;
        margin-top: 5px;
      }
    </style>
  </head>

  <body>
    <div id="tsparticles"></div>

    <div class="container mt-2">
      <h5 id="title"></h5>

      <div id="chat" class="chat-box"></div>
    </div>

    <!-- INPUT BAR -->
    <div class="input-bar">
      <button onclick="openCamera()" class="btn btn-warning">
        <i class="bi bi-camera"></i>
      </button>

      <input type="file" id="file" hidden onchange="uploadFile()" />
      <button onclick="file.click()" class="btn btn-info">
        <i class="bi bi-paperclip"></i>
      </button>

      <input id="msg" class="form-control" placeholder="Type message..." />

      <button onclick="send()" class="btn btn-primary">
        <i class="bi bi-send"></i>
      </button>
    </div>

    <!-- CAMERA -->
    <div
      id="cameraBox"
      style="
        display: none;
        position: fixed;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        background: #000;
        padding: 10px;
      "
    >
      <video id="video" autoplay></video>
      <button onclick="capture()" class="btn btn-success">Capture</button>
      <button onclick="closeCamera()" class="btn btn-danger">Close</button>
    </div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbyTYGx880F4bspI7S1C6SsLwCzkgsINz3p7kyRt1W62EPkTIOBy8uzkubGksJ8GaHQoSQ/exec";

      let email = localStorage.getItem("email");
      let batchId = localStorage.getItem("batchId");

      title.innerText = localStorage.getItem("batchName");

      // API
      async function api(a, d = {}) {
        d.action = a;
        let r = await fetch(API, {
          method: "POST",
          body: new URLSearchParams(d),
        });
        return r.json();
      }

      // SEND TEXT
      function send() {
        if (!msg.value) return;

        api("sendMessage", { batchId, email, message: msg.value }).then(() => {
          msg.value = "";
          loadChat();
        });
      }

      // LOAD CHAT
      function loadChat() {
        api("getMessages", { batchId }).then((r) => {
          chat.innerHTML = "";

          r.chats.forEach((c) => {
            let div = document.createElement("div");
            div.className = "msg " + (c.email == email ? "me" : "");

            div.innerHTML = `
<b>${c.email}</b><br>
${renderContent(c.message)}
<span class="menu" onclick="openOptions('${c.message}')">⋮</span>
`;

            chat.appendChild(div);
          });

          chat.scrollTop = chat.scrollHeight;
        });
      }

      // CONTENT RENDER
      function renderContent(m) {
        if (m.startsWith("IMG:")) {
          return `<div class="preview"><img src="${m.replace("IMG:", "")}"></div>`;
        }
        if (m.startsWith("VID:")) {
          return `<div class="preview"><video controls src="${m.replace("VID:", "")}"></video></div>`;
        }
        if (m.startsWith("AUD:")) {
          return `<audio controls src="${m.replace("AUD:", "")}"></audio>`;
        }
        return m;
      }

      // FILE UPLOAD
      function uploadFile() {
        let f = file.files[0];

        let reader = new FileReader();
        reader.onload = (e) => {
          let base64 = e.target.result.split(",")[1];

          api("uploadFile", {
            batchId,
            filedata: base64,
            filename: f.name,
            mimetype: f.type,
            createdBy: email,
          }).then((res) => {
            let url = res.url;

            // SEND IN CHAT
            let type = "FILE:";
            if (f.type.startsWith("image")) type = "IMG:";
            if (f.type.startsWith("video")) type = "VID:";
            if (f.type.startsWith("audio")) type = "AUD:";

            api("sendMessage", { batchId, email, message: type + url }).then(
              loadChat,
            );
          });
        };
        reader.readAsDataURL(f);
      }

      // CAMERA
      let stream;

      function openCamera() {
        cameraBox.style.display = "block";
        navigator.mediaDevices.getUserMedia({ video: true }).then((s) => {
          stream = s;
          video.srcObject = s;
        });
      }

      function capture() {
        let canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);

        let base64 = canvas.toDataURL("image/png").split(",")[1];

        api("uploadFile", {
          batchId,
          filedata: base64,
          filename: "photo.png",
          mimetype: "image/png",
          createdBy: email,
        }).then((res) => {
          api("sendMessage", {
            batchId,
            email,
            message: "IMG:" + res.url,
          }).then(loadChat);
        });

        closeCamera();
      }

      function closeCamera() {
        cameraBox.style.display = "none";
        if (stream) stream.getTracks().forEach((t) => t.stop());
      }

      // OPTIONS MENU
      function openOptions(text) {
        let choice = prompt("1.Copy\n2.Download\n3.Share");

        if (choice == 1) {
          navigator.clipboard.writeText(text);
          alert("Copied");
        }
        if (choice == 2) {
          window.open(text);
        }
        if (choice == 3) {
          navigator.share && navigator.share({ text });
        }
      }

      // AUTO LOAD
      setInterval(loadChat, 2000);
      loadChat();

      // PARTICLES
      tsParticles.load("tsparticles", {
        particles: {
          number: { value: 50 },
          move: { enable: true },
          links: { enable: true },
        },
      });
    </script>
  </body>
</html>
