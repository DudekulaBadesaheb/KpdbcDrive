<!doctype html>
<html>
  <head>
    <title>KPDBC Dashboard</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: white;
        overflow-x: hidden;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        color: white;
      }

      #groups .card {
        cursor: pointer;
        transition: 0.3s;
      }
      #groups .card:hover {
        transform: scale(1.03);
      }

      #menu {
        display: none;
        position: fixed;
        bottom: 80px;
        right: 20px;
      }

      .float-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        font-size: 25px;
        border-radius: 50%;
        width: 60px;
        height: 60px;
      }

      #filesPreview img,
      video {
        width: 100%;
        border-radius: 10px;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div id="tsparticles"></div>

    <div class="container mt-3">
      <h4>Welcome <span id="user"></span></h4>

      <h5 class="mt-3">Your Groups</h5>
      <div id="groups"></div>

      <h5 class="mt-4">Your Files</h5>
      <div id="filesPreview"></div>
    </div>

    <!-- FLOAT BUTTON -->
    <button onclick="toggleMenu()" class="btn btn-primary float-btn">
      <i class="bi bi-plus-lg"></i>
    </button>

    <!-- MENU -->
    <div id="menu">
      <button
        onclick="location.href = 'create-group.html'"
        class="btn btn-success w-100 mb-2"
      >
        <i class="bi bi-people"></i> Create Group
      </button>

      <input type="file" id="file" class="form-control mb-2" />

      <button onclick="uploadFile()" class="btn btn-info w-100 mb-2">
        <i class="bi bi-upload"></i> Upload File
      </button>

      <button onclick="openCamera()" class="btn btn-warning w-100 mb-2">
        <i class="bi bi-camera"></i> Camera
      </button>

      <button onclick="openNotes()" class="btn btn-secondary w-100">
        <i class="bi bi-journal"></i> Notes
      </button>
    </div>

    <!-- CAMERA MODAL -->
    <div
      id="cameraBox"
      class="card p-3"
      style="
        display: none;
        position: fixed;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
      "
    >
      <video id="video" autoplay></video>
      <button class="btn btn-success mt-2" onclick="capture()">Capture</button>
      <button class="btn btn-danger mt-2" onclick="closeCamera()">Close</button>
    </div>

    <!-- NOTES MODAL -->
    <div
      id="notesBox"
      class="card p-3"
      style="
        display: none;
        position: fixed;
        top: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
      "
    >
      <textarea id="noteText" class="form-control" rows="5"></textarea>
      <button class="btn btn-success mt-2" onclick="saveNote()">Save</button>
      <button class="btn btn-danger mt-2" onclick="closeNotes()">Close</button>
    </div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbyTYGx880F4bspI7S1C6SsLwCzkgsINz3p7kyRt1W62EPkTIOBy8uzkubGksJ8GaHQoSQ/exec";

      let email = localStorage.getItem("email");
      document.getElementById("user").innerText = email;

      // API
      async function api(a, d = {}) {
        d.action = a;
        let r = await fetch(API, {
          method: "POST",
          body: new URLSearchParams(d),
        });
        return r.json();
      }

      // LOAD GROUPS
      api("getUserPosts", { email }).then((r) => {
        groups.innerHTML = "";
        filesPreview.innerHTML = "";

        r.batches.forEach((b) => {
          groups.innerHTML += `
<div class="card p-2 mt-2" onclick="openGroup('${b[0]}','${b[1]}')">
📁 ${b[1]}
</div>`;
        });

        // SHOW FILES
        r.posts.forEach((p) => {
          let url = p[7];
          let type = p[6];

          if (type && type.startsWith("image")) {
            filesPreview.innerHTML += `<img src="${url}">`;
          } else if (type && type.startsWith("video")) {
            filesPreview.innerHTML += `<video controls src="${url}"></video>`;
          } else {
            filesPreview.innerHTML += `<div><a href="${url}" target="_blank">📄 ${p[3]}</a></div>`;
          }
        });
      });

      function openGroup(id, name) {
        localStorage.setItem("batchId", id);
        localStorage.setItem("batchName", name);
        location.href = "group.html";
      }

      // MENU
      function toggleMenu() {
        menu.style.display = menu.style.display == "none" ? "block" : "none";
      }

      // FILE UPLOAD
      function uploadFile() {
        let f = file.files[0];
        if (!f) return alert("Select file");

        let reader = new FileReader();
        reader.onload = (e) => {
          let base64 = e.target.result.split(",")[1];

          api("uploadFile", {
            batchId: localStorage.getItem("batchId") || "general",
            filedata: base64,
            filename: f.name,
            mimetype: f.type,
            createdBy: email,
          }).then(() => {
            alert("Uploaded");
            location.reload();
          });
        };
        reader.readAsDataURL(f);
      }

      // CAMERA
      let stream;

      function openCamera() {
        cameraBox.style.display = "block";
        navigator.mediaDevices.getUserMedia({ video: true }).then((s) => {
          stream = s;
          video.srcObject = s;
        });
      }

      function capture() {
        let canvas = document.createElement("canvas");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);

        let base64 = canvas.toDataURL("image/png").split(",")[1];

        api("uploadFile", {
          batchId: "general",
          filedata: base64,
          filename: "camera.png",
          mimetype: "image/png",
          createdBy: email,
        }).then(() => {
          alert("Photo Uploaded");
          closeCamera();
          location.reload();
        });
      }

      function closeCamera() {
        cameraBox.style.display = "none";
        if (stream) stream.getTracks().forEach((t) => t.stop());
      }

      // NOTES
      function openNotes() {
        notesBox.style.display = "block";
        noteText.value = localStorage.getItem("note") || "";
      }

      function saveNote() {
        localStorage.setItem("note", noteText.value);
        alert("Saved (Private)");
        closeNotes();
      }

      function closeNotes() {
        notesBox.style.display = "none";
      }

      // PARTICLES
      tsParticles.load("tsparticles", {
        particles: {
          number: { value: 60 },
          size: { value: 3 },
          move: { enable: true, speed: 1 },
          links: { enable: true },
        },
      });
    </script>
  </body>
</html>
