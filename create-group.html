<!doctype html>
<html>
  <head>
    <title>Group Manager</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
      }

      .card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
      }

      .group-card {
        cursor: pointer;
        transition: 0.3s;
      }
      .group-card:hover {
        transform: scale(1.03);
      }

      #details {
        display: none;
      }

      .file-box {
        max-height: 250px;
        overflow: auto;
      }
    </style>
  </head>

  <body>
    <div id="tsparticles"></div>

    <div class="container mt-4">
      <h3>👥 Group Manager</h3>

      <!-- CREATE -->
      <div class="card p-3 mb-3">
        <h5>Create Group</h5>
        <input id="gname" class="form-control mb-2" placeholder="Group Name" />
        <input
          id="gemails"
          class="form-control mb-2"
          placeholder="Emails comma separated"
        />

        <button class="btn btn-success" onclick="createGroup()">Create</button>
      </div>

      <!-- GROUP LIST -->
      <h5>Your Groups</h5>
      <div id="groups"></div>

      <!-- GROUP DETAILS -->
      <div id="details" class="mt-4">
        <h5 id="gtitle"></h5>

        <!-- MEMBERS -->
        <div class="card p-3 mb-3">
          <h6>Members</h6>

          <div id="members"></div>

          <div class="input-group mt-2">
            <input id="newEmail" class="form-control" placeholder="Add email" />
            <button class="btn btn-success" onclick="addMember()">Add</button>
          </div>
        </div>

        <!-- FILES -->
        <div class="card p-3">
          <h6>Uploaded Files</h6>
          <div id="files" class="file-box"></div>
        </div>
      </div>
    </div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycbyTYGx880F4bspI7S1C6SsLwCzkgsINz3p7kyRt1W62EPkTIOBy8uzkubGksJ8GaHQoSQ/exec";

      let email = localStorage.getItem("email");
      let currentBatchId = "";
      let currentEmails = [];

      // API
      async function api(a, d = {}) {
        d.action = a;
        let r = await fetch(API, {
          method: "POST",
          body: new URLSearchParams(d),
        });
        return r.json();
      }

      // CREATE GROUP
      function createGroup() {
        api("createBatch", {
          name: gname.value,
          emails: gemails.value,
          createdBy: email,
        }).then(() => {
          alert("Group Created");
          loadGroups();
        });
      }

      // LOAD GROUPS
      function loadGroups() {
        api("getUserPosts", { email }).then((r) => {
          groups.innerHTML = "";

          r.batches.forEach((b) => {
            let count = b[2] ? b[2].split(",").length : 0;

            groups.innerHTML += `
<div class="card p-2 mt-2 group-card" onclick="openGroup('${b[0]}','${b[1]}','${b[2]}')">
📁 ${b[1]} <br>
<small>👥 ${count} members</small>
</div>`;
          });
        });
      }

      // OPEN GROUP DETAILS
      function openGroup(id, name, emails) {
        currentBatchId = id;
        currentEmails = emails.split(",");

        details.style.display = "block";
        gtitle.innerText = name;

        renderMembers();
        loadFiles();
      }

      // MEMBERS UI
      function renderMembers() {
        members.innerHTML = "";

        currentEmails.forEach((e) => {
          members.innerHTML += `
<span class="badge bg-info text-dark m-1">
${e}
<i class="bi bi-x-circle" onclick="removeMember('${e}')" style="cursor:pointer"></i>
</span>`;
        });
      }

      // ADD MEMBER
      function addMember() {
        let e = newEmail.value.trim();
        if (!e) return;

        if (currentEmails.includes(e)) return alert("Already exists");

        currentEmails.push(e);
        updateMembers();
      }

      // REMOVE MEMBER
      function removeMember(e) {
        currentEmails = currentEmails.filter((x) => x !== e);
        updateMembers();
      }

      // UPDATE BACKEND
      function updateMembers() {
        api("updateBatchEmails", {
          batchId: currentBatchId,
          emails: currentEmails.join(","),
        }).then(() => {
          renderMembers();
          loadGroups();
        });
      }

      // LOAD FILES
      function loadFiles() {
        api("getPostsByBatch", { batchId: currentBatchId }).then((r) => {
          files.innerHTML = "";

          r.posts.forEach((p) => {
            let url = p[7];
            let type = p[6];

            if (type && type.startsWith("image")) {
              files.innerHTML += `<img src="${url}" style="width:100%;margin-top:5px;border-radius:10px">`;
            } else if (type && type.startsWith("video")) {
              files.innerHTML += `<video controls src="${url}" style="width:100%;margin-top:5px"></video>`;
            } else {
              files.innerHTML += `<div><a href="${url}" target="_blank">📄 ${p[3]}</a></div>`;
            }
          });
        });
      }

      // INIT
      loadGroups();

      // PARTICLES
      tsParticles.load("tsparticles", {
        particles: {
          number: { value: 60 },
          move: { enable: true },
          links: { enable: true },
        },
      });
    </script>
  </body>
</html>
