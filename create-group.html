<!doctype html>
<html>
  <head>
    <title>Group Manager</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <style>
      body {
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
      }

      /* CARD */
      .card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* GROUP */
      .group-card {
        cursor: pointer;
        transition: 0.3s;
      }
      .group-card:hover {
        transform: scale(1.03);
      }

      /* MOBILE */
      @media (max-width: 768px) {
        h3 {
          font-size: 20px;
        }
        .container {
          padding: 10px;
        }
      }

      /* FILE BOX */
      .file-box {
        max-height: 350px;
        overflow: auto;
      }

      /* FILE ITEM */
      .file-item {
        background: #111;
        padding: 10px;
        border-radius: 10px;
        margin-top: 10px;
      }

      /* PREVIEW */
      .file-item img,
      .file-item video {
        width: 100%;
        border-radius: 10px;
        cursor: pointer;
      }

      /* ACTIONS */
      .file-actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-top: 5px;
      }

      /* VIEWER */
      #viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }
      #viewer img,
      #viewer iframe {
        max-width: 90%;
        max-height: 90%;
      }
    </style>
  </head>

  <body>
    <div id="tsparticles"></div>

    <div class="container mt-4">
      <h3>👥 Group Manager</h3>

      <!-- CREATE -->
      <div class="card p-3 mb-3">
        <h5>Create Group</h5>

        <input id="gname" class="form-control mb-2" placeholder="Group Name" />
        <input
          id="gemails"
          class="form-control mb-2"
          placeholder="Emails comma separated"
        />

        <button class="btn btn-success w-100" onclick="createGroup()">
          <i class="bi bi-plus-circle"></i> Create
        </button>
      </div>

      <!-- GROUP LIST -->
      <h5>Your Groups</h5>
      <div id="groups"></div>

      <!-- DETAILS -->
      <div id="details" class="mt-4" style="display: none">
        <h5 id="gtitle"></h5>

        <!-- MEMBERS -->
        <div class="card p-3 mb-3">
          <h6>Members</h6>
          <div id="members"></div>

          <div class="input-group mt-2">
            <input id="newEmail" class="form-control" placeholder="Add email" />
            <button class="btn btn-success" onclick="addMember()">Add</button>
          </div>
        </div>

        <!-- FILES -->
        <div class="card p-3">
          <h6>Uploaded Files</h6>
          <div id="files" class="file-box"></div>
        </div>
      </div>
    </div>

    <!-- VIEWER -->
    <div id="viewer" onclick="this.style.display = 'none'"></div>

    <script>
      const API =
        "https://script.google.com/macros/s/AKfycby1EzrDZ9x6o0hR-kf9m7gLcfIZ8rJiFw-xIPIb7jo9BbjRY0VKzRWsxsfgN32sbWb6iA/exec";

      let email = localStorage.getItem("email");
      let currentBatchId = "";
      let currentEmails = [];

      /* API */
      async function api(a, d = {}) {
        d.action = a;
        let r = await fetch(API, {
          method: "POST",
          body: new URLSearchParams(d),
        });
        return r.json();
      }

      /* CREATE */
      function createGroup() {
        api("createBatch", {
          name: gname.value,
          emails: gemails.value,
          createdBy: email,
        }).then(() => {
          alert("Group Created");
          loadGroups();
        });
      }

      /* LOAD GROUPS */
      function loadGroups() {
        api("getUserPosts", { email }).then((r) => {
          groups.innerHTML = "";

          r.batches.forEach((b) => {
            let count = b[2] ? b[2].split(",").length : 0;

            groups.innerHTML += `
     <div class="card p-2 mt-2 group-card"
     onclick="openGroup('${b[0]}','${b[1]}','${b[2]}')">

     📁 ${b[1]} <br>
     <small>👥 ${count} members</small>

     </div>`;
          });
        });
      }

      /* OPEN GROUP */
      function openGroup(id, name, emails) {
        currentBatchId = id;
        currentEmails = emails.split(",");

        details.style.display = "block";
        gtitle.innerText = name;

        renderMembers();
        loadFiles();
      }

      /* MEMBERS */
      function renderMembers() {
        members.innerHTML = "";

        currentEmails.forEach((e) => {
          members.innerHTML += `
   <span class="badge bg-info text-dark m-1">
   ${e}
   <i class="bi bi-x-circle" onclick="removeMember('${e}')" style="cursor:pointer"></i>
   </span>`;
        });
      }

      /* ADD */
      function addMember() {
        let e = newEmail.value.trim();
        if (!e) return;

        if (currentEmails.includes(e)) return alert("Already exists");

        currentEmails.push(e);
        updateMembers();
      }

      /* REMOVE */
      function removeMember(e) {
        currentEmails = currentEmails.filter((x) => x !== e);
        updateMembers();
      }

      /* UPDATE */
      function updateMembers() {
        api("updateBatchEmails", {
          batchId: currentBatchId,
          emails: currentEmails.join(","),
        }).then(() => {
          renderMembers();
          loadGroups();
        });
      }

      /* LOAD FILES */
      function loadFiles() {
        api("getPostsByBatch", { batchId: currentBatchId }).then((r) => {
          files.innerHTML = "";

          r.posts.forEach((p) => {
            let url = p[7];
            let type = p[6] || "";
            let name = p[3] || "File";
            let id = p[0];

            let preview = "";

            if (type.startsWith("image")) {
              preview = `<img src="${url}" onclick="openViewer('${url}','img')">`;
            } else if (type.startsWith("video")) {
              preview = `<video controls src="${url}"></video>`;
            } else {
              preview = `<div>📄 ${name}</div>`;
            }

            files.innerHTML += `
     <div class="file-item">

     ${preview}

     <div class="file-actions">

     <!-- VIEW -->
     <button class="btn btn-sm btn-light" onclick="openViewer('${url}','file')">
     <i class="bi bi-eye"></i>
     </button>

     <!-- DOWNLOAD -->
     <button class="btn btn-sm btn-primary" onclick="downloadFile('${url}')">
     <i class="bi bi-download"></i>
     </button>

     <!-- COPY -->
     <button class="btn btn-sm btn-warning" onclick="copyLink('${url}')">
     <i class="bi bi-clipboard"></i>
     </button>

     <!-- SHARE -->
     <button class="btn btn-sm btn-success" onclick="shareFile('${url}')">
     <i class="bi bi-share"></i>
     </button>

     <!-- DELETE -->
     <button class="btn btn-sm btn-danger" onclick="deleteFile('${id}')">
     <i class="bi bi-trash"></i>
     </button>

     </div>
     </div>`;
          });
        });
      }

      /* VIEW */
      function openViewer(url, type) {
        viewer.style.display = "flex";

        if (type === "img") {
          viewer.innerHTML = `<img src="${url}">`;
        } else {
          viewer.innerHTML = `<iframe src="${url}"></iframe>`;
        }
      }

      /* DOWNLOAD */
      function downloadFile(url) {
        let a = document.createElement("a");
        a.href = url;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        a.remove();
      }

      /* COPY */
      function copyLink(url) {
        navigator.clipboard.writeText(url);
        alert("Copied!");
      }

      /* SHARE */
      function shareFile(url) {
        if (navigator.share) {
          navigator.share({ url });
          return;
        }

        let text = encodeURIComponent(url);
        window.open(`https://wa.me/?text=${text}`);
      }

      /* DELETE */
      function deleteFile(id) {
        if (!confirm("Delete file?")) return;

        api("deletePost", { postId: id }).then(loadFiles);
      }

      /* INIT */
      loadGroups();

      /* PARTICLES */
      tsParticles.load("tsparticles", {
        particles: {
          number: { value: 60 },
          move: { enable: true },
          links: { enable: true },
        },
        interactivity: {
          events: {
            onHover: { enable: true, mode: "repulse" },
          },
        },
      });
    </script>
  </body>
</html>
